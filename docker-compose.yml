services:
  postgres:
    image: postgres:16-alpine
    container_name: magic-mobile-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic-mobile-migrate
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    command: bunx prisma migrate deploy --schema packages/db/prisma/schema.prisma
    restart: "no"

  primary-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic-mobile-primary-backend
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: bun --cwd apps/primaryBackend run index.ts
    ports:
      - "9090:9090"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic-mobile-worker
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: bun --cwd apps/worker run index.ts
    ports:
      - "9091:9091"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic-mobile-frontend
    env_file:
      - .env.docker
    depends_on:
      primary-backend:
        condition: service_started
      worker:
        condition: service_started
    command: bun --cwd apps/frontend run dev --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
